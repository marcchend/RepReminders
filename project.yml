name: RepeatRemind

options:
  bundleIdPrefix: com.repeatremind
  xcodeVersion: "15"
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  RepeatRemind:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.repeatremind.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: "YES"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "YES"

    info:
      properties:
        CFBundleDisplayName: RepReminders
        NSUserNotificationsUsageDescription: "RepeatRemind utilise les notifications pour vous rappeler de valider votre présence."
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

    sources:
      - path: RepeatRemind

  RepeatRemindWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.repeatremind.app.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

    info:
      properties:
        CFBundleDisplayName: RepReminders
        WKWatchKitApp: true
        NSUserNotificationsUsageDescription: "RepeatRemind utilise les notifications pour vous rappeler de valider votre présence."

    sources:
      - path: RepeatRemindWatch
      - path: RepeatRemind/Reminder.swift
      - path: RepeatRemind/NotificationManager.swift
