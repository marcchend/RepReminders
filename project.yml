name: RepReminders

options:
  bundleIdPrefix: com.repreminders
  xcodeVersion: "15"
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  RepReminders:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.repreminders.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

    info:
      properties:
        CFBundleDisplayName: RepReminders
        NSUserNotificationsUsageDescription: "RepReminders utilise les notifications pour vous rappeler de valider votre présence."
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

    sources:
      - path: RepReminders

  RepRemindersWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.repreminders.app.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

    info:
      properties:
        CFBundleDisplayName: RepReminders
        WKWatchKitApp: true
        NSUserNotificationsUsageDescription: "RepReminders utilise les notifications pour vous rappeler de valider votre présence."

    sources:
      - path: RepRemindersWatch
      - path: RepReminders/Reminder.swift
      - path: RepReminders/NotificationManager.swift
